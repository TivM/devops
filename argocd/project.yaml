# RBAC-проект Argo CD для команды Task Manager.
# Ограничивает, что разрешено деплоить через приложения этого проекта.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: taskmanager-project
  namespace: argocd
spec:
  description: GitOps project for Task Manager (devops lab)

  # Откуда можно тянуть манифесты
  sourceRepos:
    - https://github.com/*/devops.git
    - https://github.com/*/devops

  # Куда можно деплоить
  destinations:
    - server: https://kubernetes.default.svc
      namespace: taskmanager
    - server: https://kubernetes.default.svc
      namespace: argocd

  # Разрешённые ресурсы на уровне cluster (только namespace)
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace

  # Разрешённые ресурсы на уровне namespace (всё стандартное Kubernetes)
  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: PersistentVolumeClaim
    - group: ''
      kind: Pod
    - group: apps
      kind: Deployment
    - group: apps
      kind: ReplicaSet
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: networking.k8s.io
      kind: Ingress
    - group: monitoring.coreos.com
      kind: ServiceMonitor

  orphanedResources:
    warn: true
