apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: server
  namespace: taskmanager
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - taskmanager
  selector:
    matchLabels:
      app: server
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
