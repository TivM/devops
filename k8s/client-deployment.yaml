apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: taskmanager
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      imagePullSecrets:
        - name: ycr-pull-secret
      containers:
        - name: client
          image: cr.yandex/crp601ul54omhpos8c8d/taskmanager-client:sha-ed039f14d2a095353bc2c5dfb5c0fd522eab12b8
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
