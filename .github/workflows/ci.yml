name: CI Pipeline

on:
  push:
    branches: [main]
    # игнорируем коммиты bump-image-tag (он трогает только эти файлы),
    # чтобы CI не запускался по кругу
    paths-ignore:
      - 'k8s/server-deployment.yaml'
      - 'k8s/client-deployment.yaml'
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # =========================================================
  # 1. Тесты сервера + покрытие (JaCoCo)
  # =========================================================
  server-test:
    name: Server - Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history нужен SonarCloud для blame

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Run tests with coverage (JaCoCo)
        working-directory: server
        run: mvn -B verify

      - name: Upload server coverage report
        uses: actions/upload-artifact@v4
        with:
          name: server-jacoco
          path: server/target/site/jacoco
          retention-days: 7

      - name: Upload server surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-surefire
          path: server/target/surefire-reports
          retention-days: 7

  # =========================================================
  # 2. Сборка сервера (артефакт-jar)
  # =========================================================
  server-build:
    name: Server - Build
    runs-on: ubuntu-latest
    needs: server-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build
        working-directory: server
        run: mvn -B -DskipTests package

  # =========================================================
  # 3. Тесты клиента + покрытие (vitest v8)
  # =========================================================
  client-test:
    name: Client - Test + Coverage
    runs-on: ubuntu-latest
    needs: server-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run tests with coverage
        working-directory: client
        run: npm run test:coverage

      - name: Upload client coverage report
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: client/coverage
          retention-days: 7

  # =========================================================
  # 4. Сборка клиента
  # =========================================================
  client-build:
    name: Client - Build
    runs-on: ubuntu-latest
    needs: client-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  # =========================================================
  # 5. SonarCloud — статический анализ + Quality Gate
  #    Job ПАДАЕТ, если:
  #      - не пройден Quality Gate (включает coverage >= 80%)
  #      - найдены bugs / vulnerabilities / security hotspots
  #    Quality Gate настраивается в SonarCloud → Project → Quality Gates.
  # =========================================================
  sonarcloud-scan:
    name: SonarCloud Scan (Quality Gate)
    runs-on: ubuntu-latest
    needs: [server-test, client-test]
    env:
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          MISSING=0

          for name in SONAR_TOKEN SONAR_ORGANIZATION SONAR_PROJECT_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing SonarCloud configuration::Set ${name} in GitHub repository settings."
              MISSING=1
            fi
          done

          exit "${MISSING}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # 5.1 Server: пересобираем с тестами + JaCoCo (нужны фреш classes + jacoco.xml)
      - name: Build server with coverage
        working-directory: server
        run: mvn -B verify

      # 5.2 Client: ставим зависимости и считаем coverage (нужен lcov.info)
      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Generate client coverage
        working-directory: client
        run: npm run test:coverage

      # 5.3 Сам Sonar-скан + ожидание Quality Gate
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600

  # =========================================================
  # 6. Сборка и публикация Docker-образов в Yandex Container Registry
  #    (только при push в main и только если SonarCloud Quality Gate прошёл)
  # =========================================================
  docker-publish:
    name: Docker - Publish to YCR
    runs-on: ubuntu-latest
    needs: [client-build, sonarcloud-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - image_name: taskmanager-server
            context: ./server
          - image_name: taskmanager-client
            context: ./client
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YC_OAUTH_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.image_name }}:v1
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ matrix.image_name }}:sha-${{ github.sha }}

  # =========================================================
  # 7. Обновление тега образа в манифестах k8s
  #    (для Argo CD GitOps: коммит нового sha-* тега в репо)
  # =========================================================
  bump-image-tag:
    name: GitOps - Bump image tag for Argo CD
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in kustomization
        run: |
          SHA_TAG="sha-${GITHUB_SHA}"
          cd k8s
          sed -i "s|taskmanager-server:.*|taskmanager-server:${SHA_TAG}|g" server-deployment.yaml
          sed -i "s|taskmanager-client:.*|taskmanager-client:${SHA_TAG}|g" client-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Nothing to commit (manifests already up-to-date)"
            exit 0
          fi
          git add k8s/server-deployment.yaml k8s/client-deployment.yaml
          git commit -m "ci(gitops): bump images to sha-${GITHUB_SHA} [skip ci]"
          git push

  # =========================================================
  # 8. Telegram-уведомления о статусе пайплайна
  #    Запускается ВСЕГДА (success/failure/cancelled),
  #    агрегирует результаты всех предыдущих jobs.
  # =========================================================
  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    if: always()
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    needs:
      - server-test
      - server-build
      - client-test
      - client-build
      - sonarcloud-scan
      - docker-publish
      - bump-image-tag
    steps:
      - name: Compute aggregated status
        id: status
        run: |
          # Список статусов всех jobs.
          JOBS=(
            "server-test"
            "server-build"
            "client-test"
            "client-build"
            "sonarcloud-scan"
            "docker-publish"
            "bump-image-tag"
          )
          declare -A RESULTS=(
            ["server-test"]="${{ needs.server-test.result }}"
            ["server-build"]="${{ needs.server-build.result }}"
            ["client-test"]="${{ needs.client-test.result }}"
            ["client-build"]="${{ needs.client-build.result }}"
            ["sonarcloud-scan"]="${{ needs.sonarcloud-scan.result }}"
            ["docker-publish"]="${{ needs.docker-publish.result }}"
            ["bump-image-tag"]="${{ needs.bump-image-tag.result }}"
          )

          OVERALL="success"
          REPORT=""
          for job in "${JOBS[@]}"; do
            R="${RESULTS[$job]}"
            case "$R" in
              success)   ICON="OK  " ;;
              skipped)   ICON="SKIP" ;;
              cancelled) ICON="STOP"; OVERALL="cancelled" ;;
              failure)   ICON="FAIL"; OVERALL="failure" ;;
              *)         ICON="????"; OVERALL="failure" ;;
            esac
            REPORT="${REPORT}${ICON}  ${job} (${R})"$'\n'
          done

          {
            echo "overall=${OVERALL}"
            echo "report<<EOF"
            printf "%s" "${REPORT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram message
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          OVERALL: ${{ steps.status.outputs.overall }}
          REPORT: ${{ steps.status.outputs.report }}
        run: |
          case "$OVERALL" in
            success)   HEADER="CI/CD PASSED" ;;
            failure)   HEADER="CI/CD FAILED" ;;
            cancelled) HEADER="CI/CD CANCELLED" ;;
            *)         HEADER="CI/CD UNKNOWN" ;;
          esac

          html_escape() {
            local value="$1"
            value="${value//&/&amp;}"
            value="${value//</&lt;}"
            value="${value//>/&gt;}"
            printf "%s" "$value"
          }

          REPO="$(html_escape "${GITHUB_REPOSITORY}")"
          BRANCH="$(html_escape "${GITHUB_REF_NAME}")"
          ACTOR="$(html_escape "${GITHUB_ACTOR}")"
          EVENT="$(html_escape "${GITHUB_EVENT_NAME}")"

          MSG="<b>${HEADER}</b>"$'\n'
          MSG="${MSG}Repo: <code>${REPO}</code>"$'\n'
          MSG="${MSG}Branch: <code>${BRANCH}</code>"$'\n'
          MSG="${MSG}Commit: <code>${GITHUB_SHA:0:7}</code> by ${ACTOR}"$'\n'
          MSG="${MSG}Event: <code>${EVENT}</code>"$'\n\n'
          MSG="${MSG}<b>Jobs:</b>"$'\n'
          MSG="${MSG}<pre>${REPORT}</pre>"$'\n'
          MSG="${MSG}<a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">Open run</a>"

          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true \
            --data-urlencode text="${MSG}"
