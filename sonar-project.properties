# SonarCloud configuration for Task Manager (multi-module: server + client)
#
# Organization / project keys нужно подставить под свой аккаунт SonarCloud:
#   sonar.organization=<your-sonarcloud-organization>
#   sonar.projectKey=<your-sonarcloud-project-key>
#
# Можно не править файл вручную: эти два значения CI передаёт через
# параметры sonar-scanner-cli (см. .github/workflows/ci.yml,
# job sonarcloud-scan).

sonar.projectName=Task Manager (devops lab)
sonar.projectVersion=1.0

# Исходники и тесты обоих модулей
sonar.sources=server/src/main/java,client/src
sonar.tests=server/src/test/java,client/src/__tests__
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/build/**,**/coverage/**,client/eslint.config.js,client/vite.config.js
sonar.test.exclusions=**/node_modules/**

# Языки и версии
sonar.java.source=21
sonar.java.binaries=server/target/classes
sonar.java.test.binaries=server/target/test-classes
sonar.java.libraries=server/target/dependency/*.jar
sonar.sourceEncoding=UTF-8

# Отчёты покрытия
sonar.coverage.jacoco.xmlReportPaths=server/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info

# Пути к отчётам тестов
sonar.junit.reportPaths=server/target/surefire-reports

# Что не считать в покрытии (DTO/конфиги/точка входа)
sonar.coverage.exclusions=\
  server/src/main/java/com/taskmanager/TaskManagerApplication.java,\
  server/src/main/java/com/taskmanager/entity/**,\
  server/src/main/java/com/taskmanager/repository/**,\
  client/src/main.jsx,\
  client/src/setupTests.js,\
  client/src/api.js
